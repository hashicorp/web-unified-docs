name: Forward Port PR

on:
  workflow_dispatch:
    inputs:
      prNumber:
        description: 'Number of the already-merged PR to forward-port'
        required: true
      labelSlug:
        description: 'Config slug to look up from the config file (e.g. vault-test, boundary-placeholder-label, etc...). Use this OR overrideJson, not both.'
        required: false
      overrideJson:
        description: 'JSON object with routing fields, e.g. {"sourceVersionFolder":"v1.0.0","targetProduct":"Vault","targetBranch":"vault-test","targetVersionFolder":"v1.1.0"}. Use this OR labelSlug, not both.'
        required: false

  pull_request:
    types:
      - closed
    branches:
      - 'main'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-forward-port-pr:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
      contains(join(github.event.pull_request.labels.*.name, ' '), 'forward-port:'))
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}

      MERGED_SHA: ${{ github.event.pull_request.merge_commit_sha }}
      SOURCE_PR_NUMBER: ${{ github.event.pull_request.number }}
      SOURCE_PR_TITLE: ${{ github.event.pull_request.title }}
      SOURCE_PR_URL: ${{ github.event.pull_request.html_url }}
      SOURCE_PR_AUTHOR: ${{ github.event.pull_request.user.login }}

    steps:
      # Gotta validate the inputs for the manual dispatch process so there's no confusion about where to read forward-port info from
      - name: Validate workflow_dispatch inputs
        if: github.event_name == 'workflow_dispatch'
        env:
          LABEL_SLUG: ${{ inputs.labelSlug }}
          OVERRIDE_JSON: ${{ inputs.overrideJson }}
        run: |
          if [ -n "${LABEL_SLUG}" ] && [ -n "${OVERRIDE_JSON}" ]; then
            echo "::error::Provide either labelSlug or overrideJson, not both."
            exit 1
          fi
          if [ -z "${LABEL_SLUG}" ] && [ -z "${OVERRIDE_JSON}" ]; then
            echo "::error::Provide either labelSlug (to pull routing from config) or overrideJson (raw routing fields)."
            exit 1
          fi

      - name: Derive source PR details from prNumber (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          PR_NUMBER: ${{ inputs.prNumber }}
        run: |
          PR_JSON="$(gh pr view "${PR_NUMBER}" \
            --repo "${{ github.repository }}" \
            --json number,title,url,mergeCommit,author,state)"

          if [ -z "${PR_JSON}" ] || [ "${PR_JSON}" = "null" ]; then
            echo "::error::PR #${PR_NUMBER} not found."
            exit 1
          fi

          PR_STATE="$(echo "${PR_JSON}" | jq -r '.state')"
          if [ "${PR_STATE}" != "MERGED" ]; then
            echo "::error::PR #${PR_NUMBER} is not merged (state: ${PR_STATE})."
            exit 1
          fi

          {
            echo "MERGED_SHA=$(echo "${PR_JSON}" | jq -r '.mergeCommit.oid')"
            echo "SOURCE_PR_NUMBER=$(echo "${PR_JSON}" | jq -r '.number')"
            echo "SOURCE_PR_TITLE=$(echo "${PR_JSON}" | jq -r '.title')"
            echo "SOURCE_PR_URL=$(echo "${PR_JSON}" | jq -r '.url')"
            echo "SOURCE_PR_AUTHOR=$(echo "${PR_JSON}" | jq -r '.author.login')"
          } >> "$GITHUB_ENV"

      # Check out at the merge commit so that (a) the forward-port scripts exist
      # on disk and (b) the source-version content files are present for diffing.
      - name: Check out at merge commit
        uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4
        with:
          ref: ${{ env.MERGED_SHA }}
          fetch-depth: 0
          token: ${{ secrets.CI_GITHUB_TOKEN }}

      # Determine the correct diff base SHA.
      # - PR event:          use github.event.pull_request.base.sha (the state of the
      #                      repo before the PR's commits landed; origin/main has already
      #                      advanced past this point after the merge, so we cannot use
      #                      git merge-base HEAD origin/main here).
      # - workflow_dispatch: use the first parent of MERGED_SHA (same concept,
      #                      reconstructed from git history).
      #
      # !IMPORTANT! This must run before any `git fetch ... --depth=1` calls happen and 
      # makes the repo shallow. When it's made shallow, the context for `git rev-parse` to work
      # correctly is lost, so we're storing the result in advance
      - name: Compute diff base SHA
        id: diff-base
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            sha="$(git rev-parse "${MERGED_SHA}^1")"
            echo "sha=${sha}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
          fi

      # The merge-commit checkout above populates scripts/ at the SOURCE PR's
      # merge commit. For any PR merged before a forward-port tooling change,
      # those scripts on disk are stale (e.g. an older get-changed-content-files
      # that predates the --output/--merge-base flags), which fails silently.
      # Restore only the forward-port tooling this job actually runs from the
      # current default branch so it always uses the latest versions. The four
      # files below are the entrypoints plus get-changed's relative-import dep
      # (get-files-using-partial). content/ stays at the merge commit, so the
      # diff-base logic above stays unaffected.
      - name: Restore current forward-port scripts from main
        run: |
          git fetch --no-tags --depth=1 origin main
          git checkout FETCH_HEAD -- \
            scripts/utils/get-changed-content-files.mjs \
            scripts/utils/get-files-using-partial.mjs \
            scripts/forward-port/resolve-target.mjs \
            scripts/forward-port/apply-forward-port-changes.mjs

      # ******************************************************************************************
      # ************ If the PR was merged (forward-port gha not manually dispatched): ************
      # ******************************************************************************************
      # PR event: resolve routing from the forward-port:* label + config.
      # In the situation that this is running automatically after the PR has been merged, if the slug is 
      # not in the config, falls back to a /forward-port comment on the PR. This is necessary
      # to not leak information on unreleased content
      # The comment must start with "/forward-port forward-port:<slug>" to be matched.
      # resolve-target.mjs prints the routing as JSON to stdout; this step captures it
      # and writes TARGET_BRANCH, SOURCE_VERSION_FOLDER, TARGET_VERSION_FOLDER, TARGET_PRODUCT to GITHUB_ENV.
      - name: Resolve routing from PR labels
        if: github.event_name != 'workflow_dispatch'
        run: |
          LABELS_JSON='${{ toJSON(github.event.pull_request.labels.*.name) }}'

          # Guard: exactly one forward-port:* label must be present.
          FP_LABEL_COUNT=$(echo "${LABELS_JSON}" | jq '[.[] | select(startswith("forward-port:"))] | length')
          if [ "${FP_LABEL_COUNT}" -gt 1 ]; then
            FP_LABELS=$(echo "${LABELS_JSON}" | jq -r '[.[] | select(startswith("forward-port:"))] | join(", ")')
            echo "::error::Multiple forward-port:* labels found: ${FP_LABELS}. Remove all but one and re-run."
            gh pr comment "${SOURCE_PR_NUMBER}" \
              --body "@${SOURCE_PR_AUTHOR} :x: Forward-port failed: multiple \`forward-port:*\` labels found (\`${FP_LABELS}\`). Remove all but one and re-run the workflow."
            exit 1
          fi

          SLUG=$(echo "${LABELS_JSON}" | jq -r '.[] | select(startswith("forward-port:"))' | sed 's/^forward-port://')

          CONFIG_FILE="/tmp/forward-port-config.yml"
          CONFIG_BRANCH="main"

          gh api "repos/${{ github.repository }}/contents/.github/forward-port-config.yml?ref=${CONFIG_BRANCH}" \
            --header "Accept: application/vnd.github.raw" > "${CONFIG_FILE}"

          # Fetch the /forward-port comment for this specific slug, if one exists.
          # The comment must start with "/forward-port forward-port:<slug>" to be matched.
          COMMENT_FILE="/tmp/forward-port-comment.txt"
          gh api "repos/${{ github.repository }}/issues/${SOURCE_PR_NUMBER}/comments" \
            --jq "[.[] | select(.body | startswith(\"/forward-port forward-port:${SLUG}\"))] | last | .body // empty" \
            > "${COMMENT_FILE}" 2>/dev/null || true

          RESOLVE_ARGS=("--config" "${CONFIG_FILE}" "--labels" "${LABELS_JSON}")
          if [ -s "${COMMENT_FILE}" ]; then
            RESOLVE_ARGS+=("--comment-file" "${COMMENT_FILE}")
          fi

          # resolve-target.mjs writes exactly one line of JSON to stdout and all
          # diagnostics to stderr. Do not add console.log() calls to that script —
          # any extra stdout will corrupt the jq parse below.
          ROUTING_JSON=$(node scripts/forward-port/resolve-target.mjs "${RESOLVE_ARGS[@]}")
          echo "${ROUTING_JSON}" | jq -r '
            "TARGET_BRANCH=" + .TARGET_BRANCH,
            "SOURCE_VERSION_FOLDER=" + .SOURCE_VERSION_FOLDER,
            "TARGET_VERSION_FOLDER=" + .TARGET_VERSION_FOLDER,
            "TARGET_PRODUCT=" + .TARGET_PRODUCT
          ' >> "$GITHUB_ENV"

      # ***********************************************************************
      # ************ If forward-port gha was manually dispatched): ************
      # ***********************************************************************
      # workflow_dispatch path: routing comes from overrideJson, labelSlug (config lookup),
      # workflow_dispatch: routing comes from explicit inputs only — no comment lookup- too much of
      # a headache to try to flesh out right now for this situation because in this case the manual
      # dispatch is expected to be ran multiple times on the same PR
      # For example, imagine a repo sync PR that contains changes lots of different teams want 
      # forward-ported, then they will run the manual dispatch multiple times on the same PR
      # that's already been merged.
      # Either overrideJson (raw fields written directly to GITHUB_ENV) or labelSlug
      # (config lookup only) must be provided. Validated by the first step in the job.
      - name: Resolve routing for workflow_dispatch
        if: github.event_name == 'workflow_dispatch'
        env:
          OVERRIDE_JSON: ${{ inputs.overrideJson }}
          LABEL_SLUG: ${{ inputs.labelSlug }}
        run: |
          if [ -n "${OVERRIDE_JSON}" ]; then
            # Validate it's parseable JSON first. The most common cause of
            # failure is smart quotes from copy-paste, so the error message
            # calls that out specifically.
            if ! printf '%s' "${OVERRIDE_JSON}" | jq empty 2>/dev/null; then
              echo "::error::overrideJson is not valid JSON. The usual cause is smart quotes (curly “ ” ‘ ’) from copy-paste — retype it using straight quotes in a plain-text editor (VS Code, Notepad, TextEdit in plain-text mode), not Word/Docs/Slack."
              exit 1
            fi
            # Ensure all four required routing fields are present and non-empty.
            MISSING_FIELDS=$(printf '%s' "${OVERRIDE_JSON}" | jq -r '
              ["targetBranch","sourceVersionFolder","targetVersionFolder","targetProduct"]
              - [to_entries[] | select(.value != null and .value != "") | .key]
              | join(", ")
            ')
            if [ -n "${MISSING_FIELDS}" ]; then
              echo "::error::overrideJson is missing required field(s): ${MISSING_FIELDS}. Provide all of: targetBranch, sourceVersionFolder, targetVersionFolder, targetProduct."
              exit 1
            fi
            # Parse the JSON object and write fields directly to GITHUB_ENV.
            echo "${OVERRIDE_JSON}" | jq -r '
              "TARGET_BRANCH=" + .targetBranch,
              "SOURCE_VERSION_FOLDER=" + .sourceVersionFolder,
              "TARGET_VERSION_FOLDER=" + .targetVersionFolder,
              "TARGET_PRODUCT=" + .targetProduct
            ' >> "$GITHUB_ENV"
          else
            # labelSlug: look up the slug in the config file. No comment fallback search for now.
            CONFIG_FILE="/tmp/forward-port-config.yml"
            CONFIG_BRANCH="main"

            gh api "repos/${{ github.repository }}/contents/.github/forward-port-config.yml?ref=${CONFIG_BRANCH}" \
              --header "Accept: application/vnd.github.raw" > "${CONFIG_FILE}"

            # resolve-target.mjs writes exactly one line of JSON to stdout and all
            # diagnostics to stderr. Do not add console.log() calls to that script —
            # any extra stdout will corrupt the jq parse below.
            ROUTING_JSON=$(node scripts/forward-port/resolve-target.mjs \
              --config "${CONFIG_FILE}" \
              --labels "[\"forward-port:${LABEL_SLUG}\"]")
            echo "${ROUTING_JSON}" | jq -r '
              "TARGET_BRANCH=" + .TARGET_BRANCH,
              "SOURCE_VERSION_FOLDER=" + .SOURCE_VERSION_FOLDER,
              "TARGET_VERSION_FOLDER=" + .TARGET_VERSION_FOLDER,
              "TARGET_PRODUCT=" + .TARGET_PRODUCT
            ' >> "$GITHUB_ENV"
          fi

      # After grabbing the necessary routing info from the config/comment, validate the info
      - name: Verify target branch exists
        run: |
          if ! gh api "repos/${{ github.repository }}/branches/${TARGET_BRANCH}" --silent 2>/dev/null; then
            echo "::error::Target branch '${TARGET_BRANCH}' does not exist"
            gh pr comment "${SOURCE_PR_NUMBER}" \
              --body "@${SOURCE_PR_AUTHOR} :x: Forward-port failed: target branch \`${TARGET_BRANCH}\` does not exist on this repo. Please check the config or your \`/forward-port\` comment."
            exit 1
          fi

      - name: Get changed content files from source PR
        run: |
          node scripts/utils/get-changed-content-files.mjs \
            --merge-base "${{ steps.diff-base.outputs.sha }}" \
            --include-partials false \
            --output /tmp/changedContentFiles.json || {
            gh pr comment "${SOURCE_PR_NUMBER}" \
              --body "@${SOURCE_PR_AUTHOR} :x: Forward-port failed while computing changed files. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
            exit 1
          }

      # Copy the changed source-version files to a temp location before the
      # working directory is replaced by the target-branch checkout below.
      - name: Save source files for forward-porting
        run: |
          jq -r '(.added + .modified)[]' /tmp/changedContentFiles.json | \
          while IFS= read -r f; do
            dest="/tmp/forward-port-source/${f}"
            mkdir -p "$(dirname "${dest}")"
            [ -f "${f}" ] && cp "${f}" "${dest}"
          done

      # In the case where we're dealing with long lived target branches that
      # don't have this change- just going to copy the file manually so it can run
      # in the new context. Can potentially remove this in the future when this is 
      # long past the initial pilot phase
      - name: Save apply script before target-branch checkout
        run: cp scripts/forward-port/apply-forward-port-changes.mjs /tmp/apply-forward-port-changes.mjs

      - name: Check out target branch
        uses: actions/checkout@0ad4b8fadaa221de15dcec353f45205ec38ea70b # v4.1.4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0
          token: ${{ secrets.CI_GITHUB_TOKEN }}

      # Use hashibot-web's GitHub-provided noreply address so that the forward-port
      # commit is attributed to hashibot-web (which has CLA signed) without exposing
      # the account's real email in this public repo.
      # Format: <user-id>+<username>@users.noreply.github.com
      # https://docs.github.com/en/account-and-profile/reference/email-addresses-reference#your-noreply-email-address
      - name: Configure git
        run: |
          git config user.name "hashibot-web"
          git config user.email "62622282+hashibot-web@users.noreply.github.com"

      - name: Create forward-port branch
        id: forward-port-branch
        run: |
          FORWARD_PORT_BRANCH="forward-port/pr-${SOURCE_PR_NUMBER}-to-${TARGET_BRANCH}"
          git checkout -b "${FORWARD_PORT_BRANCH}"
          echo "name=${FORWARD_PORT_BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Check for existing forward-port PR
        id: existing-pr
        run: |
          EXISTING_PR="$(gh pr list \
            --base "${TARGET_BRANCH}" \
            --head "${{ steps.forward-port-branch.outputs.name }}" \
            --state open \
            --json number \
            --jq '.[0].number')"

          if [ -n "${EXISTING_PR}" ] && [ "${EXISTING_PR}" != "null" ]; then
            gh pr comment "${SOURCE_PR_NUMBER}" \
              --body "@${SOURCE_PR_AUTHOR} A forward-port of this PR already exists: #${EXISTING_PR}. Please check it for updates."
            exit 1
          fi

      # Apply changed files from the source version directory to the target
      # version directory, rewriting the version segment in each relevant path.
      # SOURCE_VERSION_FOLDER comes from resolve-target (PR event) or workflow_dispatch inputs.
      # Source files were saved to /tmp before the target-branch checkout.
      - name: Apply forward-port changes
        run: |
          if [ -z "${SOURCE_VERSION_FOLDER}" ]; then
            echo "::error::SOURCE_VERSION_FOLDER is not set — check resolve-target step or workflow_dispatch inputs"
            gh pr comment "${SOURCE_PR_NUMBER}" \
              --body "@${SOURCE_PR_AUTHOR} :x: Forward-port failed: \`SOURCE_VERSION_FOLDER\` was not set. This is a bug — please file an issue."
            exit 1
          fi

          node /tmp/apply-forward-port-changes.mjs \
            --changes-file /tmp/changedContentFiles.json \
            --target-product "${TARGET_PRODUCT}" \
            --source-version "${SOURCE_VERSION_FOLDER}" \
            --target-version "${TARGET_VERSION_FOLDER}" \
            --source-dir /tmp/forward-port-source || {
            gh pr comment "${SOURCE_PR_NUMBER}" \
              --body "@${SOURCE_PR_AUTHOR} :x: Forward-port failed while applying changes (\`apply-forward-port-changes.mjs\` exited non-zero). Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
            exit 1
          }

      - name: Commit forward-port changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit after forward-port"
            gh pr comment "${SOURCE_PR_NUMBER}" \
              --body "@${SOURCE_PR_AUTHOR} :x: Forward-port produced no file changes — nothing to port, so no PR was opened. This usually means the source version directory had no files matching the target product. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
            exit 1
          fi
          git commit -m "[FORWARD-PORT] PR #${SOURCE_PR_NUMBER}: ${SOURCE_PR_TITLE}"

      - name: Push forward-port branch
        run: |
          git push --set-upstream origin "${{ steps.forward-port-branch.outputs.name }}" || {
            gh pr comment "${SOURCE_PR_NUMBER}" \
              --body "@${SOURCE_PR_AUTHOR} :x: Forward-port failed: could not push branch \`${{ steps.forward-port-branch.outputs.name }}\`. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
            exit 1
          }

      - name: Create forward-port pull request
        id: create-pr
        run: |
          PR_BODY="$(printf "This PR forward-ports changes from #%s\n\nSource PR Author: @%s" "${SOURCE_PR_NUMBER}" "${SOURCE_PR_AUTHOR}")"

          PR_URL="$(gh pr create \
            --base "${TARGET_BRANCH}" \
            --head "${{ steps.forward-port-branch.outputs.name }}" \
            --title "[FORWARD-PORT] #${SOURCE_PR_NUMBER} ${SOURCE_PR_TITLE}" \
            --label "auto-port" \
            --assignee "${SOURCE_PR_AUTHOR}" \
            --body "${PR_BODY}")" || {
            gh pr comment "${SOURCE_PR_NUMBER}" \
              --body "@${SOURCE_PR_AUTHOR} :x: Forward-port failed: could not create the forward-port PR. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
            exit 1
          }
          echo "url=${PR_URL}" >> "$GITHUB_OUTPUT"

      - name: Comment on source PR
        run: |
          FORWARD_PORT_URL="${{ steps.create-pr.outputs.url }}"
          gh pr comment "${SOURCE_PR_NUMBER}" \
            --body "@${SOURCE_PR_AUTHOR} Ported to ${TARGET_BRANCH} in ${FORWARD_PORT_URL}"
