name: Test Slack Notification
run-name: Test Slack notification
permissions:
  contents: write
  pull-requests: write
  
on:
  workflow_dispatch:
    inputs:
      webhook-url:
        description: 'Slack webhook URL to test (incoming: hooks.slack.com/services/... or trigger: hooks.slack.com/triggers/...)'
        required: true

jobs:
  test-slack:
    runs-on: ubuntu-latest
    steps:
      - name: Send test Slack notification
        id: slack
        env:
          SLACK_WEBHOOK_URL: ${{ inputs.webhook-url }}
          SLACK_WEBHOOK_TYPE: incoming-webhook
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          payload: |
            {
              "text": "Test notification from GitHub Actions",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": " :memo: *A new release PR is out!* :memo:"
                  }
                },
                {
                  "type": "divider"
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "Please Review the PR - https://github.com/hashicorp/web-unified-docs-internal/pull/test"
                  }
                },
                {
                  "type": "divider"
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": " :question: Questions? Please ask here for help! :question:"
                  }
                }
              ]
            }
